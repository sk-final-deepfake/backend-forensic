name: Secret Scan

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fail on tracked secret-like file paths
        shell: bash
        run: |
          set -euo pipefail
          forbidden=$(
            git ls-files \
              | grep -E '(^|/)\.env$|(^|/)config/(secrets|infra)\.env$|\.(pem|key|p12|pfx)$' \
              | grep -vxF '.env.example' \
              | grep -vxF 'config/infra.env.example' \
              || true
          )
          if [ -n "$forbidden" ]; then
            echo "::error::Tracked secret-like files must not be in git:"
            echo "$forbidden"
            exit 1
          fi

      - name: Scan tracked content for private key headers
        shell: bash
        run: |
          set -euo pipefail
          matches=$(
            git grep -I -l -E 'BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY' -- \
              ':(exclude)*.md' \
              ':(exclude)scripts/git/pre-commit-block-secrets' \
              || true
          )
          if [ -n "$matches" ]; then
            echo "::error::Private key material found in tracked files:"
            echo "$matches"
            exit 1
          fi

      - name: Scan PR diff for newly added secret-like paths
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          added=$(
            git diff --name-only --diff-filter=A "$base" "$head" \
              | grep -E '(^|/)\.env$|(^|/)config/(secrets|infra)\.env$|\.(pem|key|p12|pfx)$|(^|/)crypto/' \
              | grep -vxF '.env.example' \
              | grep -vxF 'config/infra.env.example' \
              || true
          )
          if [ -n "$added" ]; then
            echo "::error::PR adds secret-like files:"
            echo "$added"
            exit 1
          fi
