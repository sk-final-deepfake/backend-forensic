server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: forenshield-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 2GB
  autoconfigure:
    exclude: org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration
  rabbitmq:
    host: ${RABBITMQ_HOST:}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:}
    password: ${RABBITMQ_PASSWORD:}

jwt:
  # 운영: JWT_SECRET_KEY 환경 변수 필수 (K8s Secret 등)
  # 로컬: application-local.yaml 기본값 또는 JWT_SECRET_KEY 직접 설정
  secret: ${JWT_SECRET_KEY:${JWT_SECRET:}}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

file:
  upload-dir: ${FILE_UPLOAD_DIR:uploads/original}

ffmpeg:
  path: ${FFMPEG_PATH:C:\ffmpeg\ffmpeg-8.1.1-essentials_build\bin}

# 인프라팀 env 변수와 1:1 매핑
forenshield:
  aws:
    region: ${AWS_REGION:ap-northeast-2}
    account-id: ${AWS_ACCOUNT_ID:}
    role-arn: ${AWS_ROLE_ARN:}
  s3:
    evidence-bucket: ${S3_EVIDENCE_BUCKET:}
    models-bucket: ${S3_MODELS_BUCKET:}
  ai-gateway-url: ${AI_GATEWAY_URL:}
  redis:
    host: ${REDIS_HOST:}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    ssl: ${REDIS_SSL:false}
  rabbitmq:
    host: ${RABBITMQ_HOST:}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:}
    password: ${RABBITMQ_PASSWORD:}

# S3Config · FileService 연동용
aws:
  region: ${AWS_REGION:ap-northeast-2}
  s3:
    evidence-bucket: ${S3_EVIDENCE_BUCKET:forenshield-evidence-877044078824}

analysis:
  worker:
    mode: ${ANALYSIS_WORKER_MODE:local}
    step-delay-ms: ${ANALYSIS_WORKER_STEP_DELAY_MS:600}
  messaging:
    analysis-exchange: ${ANALYSIS_EXCHANGE:ai.analysis.exchange}
    result-exchange: ${AI_RESULT_EXCHANGE:ai.result.exchange}
    dead-letter-exchange: ${ANALYSIS_DLX:ai.dead.exchange}
    video-analysis-routing-key: ${ANALYSIS_ROUTING_KEY:analyze.video}
    video-result-routing-key: ${AI_RESULT_ROUTING_KEY:result.video}
    presign-duration-minutes: ${ANALYSIS_PRESIGN_MINUTES:120}

blockchain:
  anchor:
    enabled: ${BLOCKCHAIN_ANCHOR_ENABLED:true}
    mode: ${BLOCKCHAIN_ANCHOR_MODE:simulated}
    network: ${BLOCKCHAIN_ANCHOR_NETWORK:local-simulated}
    http-url: ${BLOCKCHAIN_ANCHOR_URL:}
    scheduler-enabled: ${BLOCKCHAIN_ANCHOR_SCHEDULER_ENABLED:true}
    daily-cron: ${BLOCKCHAIN_ANCHOR_DAILY_CRON:0 0 1 * * *}
