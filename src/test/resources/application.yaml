spring:
  profiles:
    active: test
  datasource:
    url: jdbc:h2:mem:forenshield-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
  autoconfigure:
    exclude: org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration

file:
  upload-dir: build/test-uploads/original

ffmpeg:
  path: C:\ffmpeg\ffmpeg-8.1.1-essentials_build\bin

jwt:
  secret: test-jwt-secret-key-for-unit-tests-only
  expiration-ms: 3600000

aws:
  region: ap-northeast-2
  s3:
    evidence-bucket: test-evidence-bucket
